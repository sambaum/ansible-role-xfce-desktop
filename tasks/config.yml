### Zellij ### Config

- name: Create directory .config/zellij
  ansible.builtin.file:
    path: "{{ item.home }}/.config/zellij"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
  loop: "{{ desktop_users }}"

- name: Remove old zellij.kdl (wrong config filename, deployed before 2026-05)
  ansible.builtin.file:
    path: "{{ item.home }}/.config/zellij/zellij.kdl"
    state: absent
  loop: "{{ desktop_users }}"

- name: Deploy zellij.conf
  ansible.builtin.copy:
    src: zellij-config.kdl
    dest: "{{ item.home }}/.config/zellij/config.kdl"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
  loop: "{{ desktop_users }}"

- name: Create directory .config/zellij/layouts
  ansible.builtin.file:
    path: "{{ item.home }}/.config/zellij/layouts"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
  loop: "{{ desktop_users }}"

- name: Deploy zellij default layout
  ansible.builtin.copy:
    src: "{{ lookup('first_found', zellij_layout_candidates) }}"
    dest: "{{ item.home }}/.config/zellij/layouts/default.kdl"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
  vars:
    zellij_layout_candidates:
      - "zellij-layouts/{{ inventory_hostname }}.kdl"
      - "zellij-layouts/{{ group_names | first }}.kdl"
      - "zellij-layouts/default.kdl"
  loop: "{{ desktop_users }}"


### VSCodium ### Extensions

- name: Install VSCodium extensions
  ansible.builtin.command:
    cmd: codium --install-extension {{ item.1 }}
  become: true
  become_user: "{{ item.0.name }}"
  loop: "{{ desktop_users | selectattr('vscodium', 'defined') | selectattr('vscodium') | list | product(vscodium_extensions) | list }}"
  when: vscodium_extensions | length > 0
  changed_when: false

- name: Auto-assign panel item IDs
  ansible.builtin.set_fact:
    xfce_panel_items: >-
      {%- set result = [] -%}
      {%- for item in xfce_panel_items -%}
        {%- set _ = result.append(item | combine({'id': loop.index})) -%}
      {%- endfor -%}
      {{ result }}

### Browser

- name: Create directory {{ item }}
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
  loop:
  - /etc/chromium/policies/managed/
  - /etc/brave/policies/managed/

- name: Install Brave/Chromium Extension
  ansible.builtin.template:
    src: ExtensionInstallForcelist.json.j2
    dest: "/etc/{{ item }}/policies/managed/ExtensionInstallForcelist.json"
    owner: root
    group: root
  loop:
  - chromium
  - brave

- name: Chromium Policies
  ansible.builtin.template:
    src: genericChromeEnterprisePolicyTemplate.json.j2
    dest: "/etc/chromium/policies/managed/{{ item.name }}.json"
    owner: root
    group: root
  loop: "{{ chromium_enterprise_policies }}"

- name: Brave Policies
  ansible.builtin.template:
    src: genericChromeEnterprisePolicyTemplate.json.j2
    dest: "/etc/brave/policies/managed/{{ item.name }}.json"
    owner: root
    group: root
  loop: "{{ chromium_enterprise_policies }}"

### XFCE ### Generic xfce directories

- name: Create directory /.config/xfce4/xfconf/xfce-perchannel-xml
  ansible.builtin.file:
    path: "{{ item.home }}/.config/xfce4/xfconf/xfce-perchannel-xml"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
  loop: "{{ desktop_users }}"

### XFCE ### Desktop

- name: Copy desktop background
  ansible.builtin.copy:
    src: "wallpapers/{{ xfce_background }}"
    dest: "/usr/share/backgrounds/xfce/{{ xfce_background }}"

### XFCE ### Panel

- name: Clean panel config directory
  ansible.builtin.file:
    path: "{{ item.home }}/.config/xfce4/panel"
    state: absent
  loop: "{{ desktop_users }}"
  when: xfce_panel_clean

- name: Create folders for desktop files
  ansible.builtin.file:
    path: "{{ item.0.home }}/.config/xfce4/panel/launcher-{{ item.1.id }}/"
    state: directory
    owner: "{{ item.0.name }}"
    group: "{{ item.0.name }}"
  loop: "{{ desktop_users | product(xfce_panel_items | selectattr('desktop_file', 'defined') | list) | list }}"

- name: Deploy desktop files
  ansible.builtin.copy:
    src: "{{ item.1.desktop_file }}"
    dest: "{{ item.0.home }}/.config/xfce4/panel/launcher-{{ item.1.id }}/{{ item.1.desktop_file }}"
    owner: "{{ item.0.name }}"
    group: "{{ item.0.name }}"
  loop: "{{ desktop_users | product(xfce_panel_items | selectattr('desktop_file', 'defined') | list) | list }}"

- name: Configure genmon
  ansible.builtin.template:
    src: genmon.rc.j2
    dest: "{{ item.0.home }}/.config/xfce4/panel/genmon-{{ item.1.id }}.rc"
    owner: "{{ item.0.name }}"
    group: "{{ item.0.name }}"
  loop: "{{ desktop_users | product(xfce_panel_items | selectattr('name', 'equalto', 'genmon') | list) | list }}"

- name: Configure whiskermenu
  ansible.builtin.copy:
    src: whiskermenu.rc
    dest: "{{ item.0.home }}/.config/xfce4/panel/whiskermenu-{{ item.1.id }}.rc"
    owner: "{{ item.0.name }}"
    group: "{{ item.0.name }}"
  loop: "{{ desktop_users | product(xfce_panel_items | selectattr('name', 'equalto', 'whiskermenu') | list) | list }}"

- name: Configure systemload panel
  ansible.builtin.copy:
    src: systemload.rc
    dest: "{{ item.0.home }}/.config/xfce4/panel/systemload-{{ item.1.id }}.rc"
    owner: "{{ item.0.name }}"
    group: "{{ item.0.name }}"
  loop: "{{ desktop_users | product(xfce_panel_items | selectattr('name', 'equalto', 'systemload') | list) | list }}"

- name: Configure netload panel
  ansible.builtin.template:
    src: netload.rc.j2
    dest: "{{ item.0.home }}/.config/xfce4/panel/netload-{{ item.1.id }}.rc"
    owner: "{{ item.0.name }}"
    group: "{{ item.0.name }}"
  loop: "{{ desktop_users | product(xfce_panel_items | selectattr('name', 'equalto', 'netload') | list) | list }}"

### XFCE ### panel XML (deployed as file to avoid xfconf-query array+subproperty limitations)

- name: Deploy xfce4-panel.xml
  ansible.builtin.template:
    src: xfce4-panel.xml.j2
    dest: "{{ item.home }}/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-panel.xml"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
  loop: "{{ desktop_users }}"
  tags:
  - xinitrc

### XFCE ### xinitrc

- name: Deploy configure-xfce.sh
  ansible.builtin.template:
    src: configure-xfce.sh.j2
    dest: "{{ item.home }}/.config/xfce4/configure-xfce.sh"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0744"
  loop: "{{ desktop_users }}"
  tags:
  - xinitrc

- name: Apply xfce xfconf settings
  ansible.builtin.command: dbus-run-session -- {{ item.home }}/.config/xfce4/configure-xfce.sh
  become: true
  become_user: "{{ item.name }}"
  changed_when: false
  loop: "{{ desktop_users }}"
  tags:
  - xinitrc

- name: Deploy xinitrc
  ansible.builtin.template:
    src: xinitrc.j2
    dest: "{{ item.home }}/.config/xfce4/xinitrc"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0744"
  loop: "{{ desktop_users }}"
  tags:
  - xinitrc

### XFCE ### xfce xsession (for XRDP)


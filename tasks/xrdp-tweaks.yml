# experimenting with xrdp improvements/tweaks for better stability with xfce4

# Prevent needrestart from auto-restarting xrdp after library upgrades (e.g.
# libssl). needrestart runs as a dpkg post-invoke hook and would otherwise
# restart xrdp mid-session whenever a linked library is updated.
- name: Deploy needrestart override to prevent xrdp auto-restart
  ansible.builtin.copy:
    dest: /etc/needrestart/conf.d/xrdp.conf
    content: |
      # Do not automatically restart xrdp services after library upgrades.
      # xrdp session restarts kill active desktop sessions.
      $nrconf{override_rc}{qr(^xrdp)} = 0;
    owner: root
    group: root
    mode: '0644'

- name: Set IdleTimeLimit in /etc/xrdp/sesman.ini
  ansible.builtin.lineinfile:
    path: /etc/xrdp/sesman.ini
    regexp: '^IdleTimeLimit='
    line: 'IdleTimeLimit={{ xrdp_IdleTimeLimit }}'
    insertafter: '^\[Sessions\]'
    state: present
    create: no
    backup: yes
  notify:
  - Restart xrdp
  - Restart xrdp-sesman

- name: Set KillDisconnected in /etc/xrdp/sesman.ini
  ansible.builtin.lineinfile:
    path: /etc/xrdp/sesman.ini
    regexp: '^KillDisconnected='
    line: 'KillDisconnected={{ xrdp_KillDisconnected }}'
    insertafter: '^\[Sessions\]'
    state: present
    create: no
    backup: yes
  notify:
  - Restart xrdp
  - Restart xrdp-sesman

- name: Set DisconnectedTimeLimit in /etc/xrdp/sesman.ini
  ansible.builtin.lineinfile:
    path: /etc/xrdp/sesman.ini
    regexp: '^DisconnectedTimeLimit='
    line: 'DisconnectedTimeLimit={{ xrdp_DisconnectedTimeLimit }}'
    insertafter: '^\[Sessions\]'
    state: present
    create: no
    backup: yes
  notify:
  - Restart xrdp
  - Restart xrdp-sesman

# TCP keepalive tuning: detect dead connections (Windows sleep etc.) in ~4 min
# instead of the OS default of ~2 hours.
- name: Deploy TCP keepalive tuning for xrdp
  ansible.builtin.copy:
    dest: /etc/sysctl.d/60-xrdp-tcp-keepalive.conf
    content: |
      # Detect dead xrdp connections (e.g. client PC went to sleep) quickly so
      # the session is marked disconnected and reconnection works cleanly.
      # Detection time: 120s idle + 4 * 30s = ~4 minutes.
      net.ipv4.tcp_keepalive_time = 120
      net.ipv4.tcp_keepalive_intvl = 30
      net.ipv4.tcp_keepalive_probes = 4
    owner: root
    group: root
    mode: '0644'
  when: xrdp_tcp_keepalive_tuning | bool
  notify: Reload sysctl

- name: Remove TCP keepalive tuning for xrdp (revert to OS defaults)
  ansible.builtin.file:
    path: /etc/sysctl.d/60-xrdp-tcp-keepalive.conf
    state: absent
  when: not (xrdp_tcp_keepalive_tuning | bool)
  notify: Reload sysctl

# test if /etc/xrdp/startwm.sh over files/startwm-default.sh works better.
# Verdict: This section can be deleted, unless some client have the workaround (/etc/xrdp/startwm.sh) configured.
- name: Deploy /etc/xrdp/startwm.sh (reconnect-safe version)
  ansible.builtin.copy:
    # src: files/startwm.sh
    src: files/startwm-default.sh
    dest: /etc/xrdp/startwm.sh
    owner: root
    group: root
    mode: '0755'
    backup: yes
  notify:
  - Restart xrdp-sesman

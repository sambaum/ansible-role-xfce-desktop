- name: Combine package lists
  ansible.builtin.set_fact:
    apt__packages: "{{ xfce_desktop_package_list_xfce + xfce_desktop_package_list }}"

- name: Download Microsoft APT signing key
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /etc/apt/keyrings/microsoft.asc
    mode: '0644'

- name: Dearmor Microsoft APT signing key
  ansible.builtin.shell:
    cmd: gpg --dearmor < /etc/apt/keyrings/microsoft.asc > /etc/apt/keyrings/microsoft.gpg
    creates: /etc/apt/keyrings/microsoft.gpg

- name: Configure APT repositories
  ansible.builtin.include_role:
    name: debops.debops.apt
  vars:
    apt__packages: []

- name: Update APT cache
  ansible.builtin.apt:
    update_cache: true

- name: Install packages
  ansible.builtin.apt:
    name: "{{ apt__packages }}"
    state: present

- name: Install XFCE Packages
  ansible.builtin.include_role:
    name: debops.debops.apt_install

- name: Install nodejs Packages
  ansible.builtin.include_role:
    name: debops.debops.nodejs

# TODO: remove package_list_host_snap from host_vars
- name: Install Snap packages
  community.general.snap:
    name: "{{ item.name }}"
    classic: "{{ item.classic | default(false) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ xfce_desktop_package_list_snap }}"

- name: Configure Systemd
  ansible.builtin.include_role:
    name: debops.debops.systemd

- name: Ensure correct permissions for snakeoil SSL key
  ansible.builtin.file:
    path: /etc/ssl/private/ssl-cert-snakeoil.key
    owner: root
    group: ssl-cert
    mode: '0640'
  notify: Restart xrdp

- name: Add xrdp user to ssl-cert group
  ansible.builtin.user:
    name: xrdp
    groups: ssl-cert
    append: true
  notify: Restart xrdp

apt__repositories:
- name: brave
  filename: brave.sources
  uris: https://brave-browser-apt-release.s3.brave.com/
  signed_by: https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
  suites: 'stable'
  components: "main"
- name: vscode
  filename: vscode.sources
  uris: https://packages.microsoft.com/repos/code
  signed_by: /etc/apt/keyrings/microsoft.gpg
  suites: 'stable'
  components: "main"
- name: vscodium
  filename: vscodium.sources
  uris: https://download.vscodium.com/debs
  signed_by: /usr/share/keyrings/vscodium-archive-keyring.gpg
  suites: vscodium
  components: "main"


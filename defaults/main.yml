---

### General

desktop_users:
- name: sam
  home: /home/sam
  vscodium: true
- name: root
  home: /root

xfce_background: default_background.png

# Set to true to wipe ~/.config/xfce4/panel/ before deploying panel files.
# Use this after removing or reordering panel items to clean up orphaned files.
xfce_panel_clean: false

xrdp_idle_time_limit: 0 # time until RDP disconnect
xrdp_kill_disconnected: false # if RDP logoff should happen after xrdp_disconnected_time_limit
xrdp_disconnected_time_limit: 14400 # time until RDP logoff

# Tune OS TCP keepalive to detect dead connections (e.g. Windows sleep) within
# a few minutes instead of the default 2 hours. Set to false to revert to
# OS defaults (7200/75/9).
xrdp_tcp_keepalive_tuning: false

# Deploy a reconnectwm.sh that restarts xfwm4 if it crashed while disconnected.
# Set to false to revert to the default empty script shipped by xrdp.
xrdp_reconnectwm_restart_wm: true


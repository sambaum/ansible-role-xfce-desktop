# === Copy-Paste ===
# Note about Zellij: since Zellij grabs the mouse, it doesnt work with "ungrabbed".
#   It's ok to use "grabbed" because this is only for right-click paste, and Zellij
#   doesn't use that (only left-click for selection).
mouse_map right press grabbed paste_from_clipboard
copy_on_select yes

# === Font ===
font_family DejaVuSansMono Nerd Font Mono
symbol_map U+E000-U+F1AF0 DejaVuSansMono Nerd Font

# === Theme ===
# Theme: Solarized Dark
background #001e26
foreground #708183
cursor #708183
selection_background #002731
color0 #002731
color8 #001e26
color1 #d01b24
color9 #bd3612
color2 #728905
color10 #465a61
color3 #a57705
color11 #52676f
color4 #2075c7
color12 #708183
color5 #c61b6e
color13 #5856b9
color6 #259185
color14 #81908f
color7 #e9e2cb
color15 #fcf4dc
